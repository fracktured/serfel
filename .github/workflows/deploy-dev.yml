name: Deploy dev

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: SST deploy dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Start MariaDB for tests
        run: docker compose -f packages/db/docker-compose.yml up -d --wait

      - name: Run workspace tests
        run: pnpm -r test

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::146476548567:role/serfel-github-actions-role
          aws-region: us-east-1

      - name: Deploy
        run: npx sst deploy --stage dev

      - name: Run DB migrations (skips if DB is stopped)
        run: |
          STATUS=$(aws rds describe-db-instances \
            --db-instance-identifier serfel-dev-db --region us-east-1 \
            --query 'DBInstances[0].DBInstanceStatus' --output text 2>/dev/null || echo "missing")
          if [ "$STATUS" = "available" ]; then
            aws lambda invoke --region us-east-1 --function-name serfel-dev-migrate \
              --cli-read-timeout 120 response.json
            cat response.json
            grep -q '"ok":true' response.json
          else
            echo "::warning::serfel-dev-db is '$STATUS' — migrations skipped. Run 'pnpm db:migrate' after starting the DB."
          fi
